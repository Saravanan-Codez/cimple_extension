<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="termGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E1E24" />
      <stop offset="100%" stop-color="#0F0F12" />
    </linearGradient>
    <linearGradient id="checkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00FF87" /> <!-- Neon Green -->
      <stop offset="100%" stop-color="#60EFFF" /> <!-- Cyan -->
    </linearGradient>
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <style>
    .background {
      fill: #121214;
    }
    .terminal-header {
      fill: #2A2A30;
    }
    .terminal-body {
      fill: url(#termGrad);
      stroke: #33333C;
      stroke-width: 2;
    }
    .text-green {
      fill: #00FF87;
      font-family: 'Courier New', Courier, monospace;
      font-size: 14px;
      font-weight: bold;
    }
    .text-white {
      fill: #E2E2E6;
      font-family: 'Courier New', Courier, monospace;
      font-size: 14px;
    }
    .cursor {
      fill: #00FF87;
      animation: blink 1s step-end infinite;
    }
    .check-mark {
      stroke: url(#checkGrad);
      stroke-width: 8;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
      stroke-dasharray: 100;
      stroke-dashoffset: 100;
      animation: drawCheck 2s cubic-bezier(0.4, 0, 0.2, 1) forwards infinite;
      filter: url(#neonGlow);
    }
    @keyframes blink {
      50% { opacity: 0; }
    }
    @keyframes drawCheck {
      0% {
        stroke-dashoffset: 100;
        opacity: 0.3;
      }
      35% {
        stroke-dashoffset: 0;
        opacity: 1;
      }
      70%, 100% {
        stroke-dashoffset: 0;
        opacity: 1;
        transform: scale(1.02);
      }
    }
  </style>

  <!-- Dark Rounded Background -->
  <rect width="256" height="256" rx="48" class="background" />

  <!-- Terminal window container -->
  <rect x="32" y="48" width="192" height="130" rx="12" class="terminal-body" />
  
  <!-- Terminal Header bar -->
  <path d="M32 60 C32 54, 38 48, 44 48 L212 48 C218 48, 224 54, 224 60 L224 75 L32 75 Z" class="terminal-header" />
  
  <!-- Header Window Controls -->
  <circle cx="52" cy="62" r="4" fill="#FF5F56" />
  <circle cx="68" cy="62" r="4" fill="#FFBD2E" />
  <circle cx="84" cy="62" r="4" fill="#27C93F" />

  <!-- Terminal Text Simulation -->
  <text x="48" y="105" class="text-green">&gt; falkon -v</text>
  <text x="48" y="130" class="text-white">Falkon compiler v0.1.0</text>
  <text x="48" y="155" class="text-green">PATH check OK</text>
  
  <!-- Blinking Cursor -->
  <rect x="162" y="143" width="8" height="14" class="cursor" />

  <!-- Pulsing/Drawing Checkmark Overlay -->
  <path d="M96 210 L120 230 L166 185" class="check-mark" />
</svg>
