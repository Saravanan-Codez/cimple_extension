<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <!-- Linear Gradients for Premium Look -->
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8A2BE2" /> <!-- Neon Purple -->
      <stop offset="100%" stop-color="#00FFFF" /> <!-- Electric Cyan -->
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF007F" /> <!-- Hot Pink -->
      <stop offset="100%" stop-color="#7B2CBF" /> <!-- Violet -->
    </linearGradient>
    <!-- Drop Shadow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Style tag for animations -->
  <style>
    .background {
      fill: #121214;
    }
    .logo-container {
      transform-origin: 128px 128px;
      animation: pulse 3s ease-in-out infinite;
    }
    .orbit-ring {
      fill: none;
      stroke: url(#glowGrad);
      stroke-width: 2;
      stroke-dasharray: 8 16 32 16;
      transform-origin: 128px 128px;
      animation: rotateRing 12s linear infinite;
    }
    .orbit-dot {
      fill: #00FFFF;
      transform-origin: 128px 128px;
      animation: rotateRing 8s linear reverse infinite;
      filter: drop-shadow(0 0 6px #00FFFF);
    }
    @keyframes rotateRing {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes pulse {
      0%, 100% {
        transform: scale(0.96);
        filter: drop-shadow(0 0 8px rgba(138, 43, 226, 0.4));
      }
      50% {
        transform: scale(1.04);
        filter: drop-shadow(0 0 24px rgba(0, 255, 255, 0.8));
      }
    }
  </style>

  <!-- Dark Rounded Background -->
  <rect width="256" height="256" rx="48" class="background" />

  <!-- Outer Orbiting Ring -->
  <circle cx="128" cy="128" r="96" class="orbit-ring" />
  
  <!-- Outer Orbiting Dot -->
  <circle cx="128" cy="32" r="4" class="orbit-dot" />

  <!-- Center Animated Logo Group -->
  <g class="logo-container">
    <!-- Stylized Wings / Shield -->
    <path d="M64 80 L128 48 L192 80 L128 208 Z" fill="none" stroke="url(#primaryGrad)" stroke-width="6" stroke-linejoin="round" />
    <path d="M80 90 L128 64 L176 90 L128 180 Z" fill="url(#primaryGrad)" opacity="0.15" />
    
    <!-- Stylized Falcon/Arrow emblem -->
    <path d="M128 75 L160 120 L128 108 L96 120 Z" fill="url(#glowGrad)" filter="url(#glow)" />
    <path d="M128 120 L145 160 L128 150 L111 160 Z" fill="url(#primaryGrad)" />
  </g>
</svg>
